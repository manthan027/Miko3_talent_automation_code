# ============================================================================
# Miko3 Talents Automation Framework - Configuration
# ============================================================================

# --- Device Settings ---
device:
  serial: ""                        # Leave empty for auto-detect, or set e.g. "192.168.1.100:5555"
  adb_path: "adb"                   # Full path to ADB binary if not in PATH
  connection_timeout: 30            # Seconds to wait for device connection
  command_timeout: 15               # Default timeout for ADB commands (seconds)
  retry_attempts: 3                 # Number of retries for failed ADB commands
  retry_delay: 2                    # Seconds between retries
  stay_awake: true                  # Keep screen on during tests
  brightness: 127                   # Screen brightness (0-255) - 50% for battery saving

# --- Screen Properties ---
screen:
  width: 1280                       # Miko3 screen width in pixels
  height: 720                       # Miko3 screen height in pixels
  density: 160                      # Screen density (dpi)

# --- Talent Package Mappings ---
# Update these with actual Miko3 package names discovered via `adb shell pm list packages | grep miko`
talents:
  mikoji:
    package: "com.miko.mikoji"
    activity: ".MainActivity"
    display_name: "Mikojis Talent"
    launch_method: "click"                # Options: "am_start" (default), "click", or "search"
    app_icon_coordinates: [1207, 644]     # For "click" method: [x, y] coordinates of app icon
    search_enabled: true                  # For "search" method: enable search-based launching
    search_config:                        # For "search" method: configuration
      apps_button_coordinates: [1207, 644]   # [x, y] - coordinates of "Apps" button on home screen
      search_icon_coordinates: [1228, 53] # [x, y] - coordinates of search icon inside apps drawer
      click_on_search_icon: [444, 64]     # [x, y] - coordinates of click on search icon field to enter details
      search_text: "Mikojis"
      press_enter_to_close_keyboard : [1207, 665]             # Text to search for in search bar
      click_on_talent_icon: [238, 365]     # [x, y] - coordinates of talent icon to click (auto-detect if null)
    intent_extras:
      APP_ID: "11"
      INTENT: "play_video"
    coordinates:
      play_button: [640, 400]
      next_button: [1100, 750]
      back_button: [180, 50]
      pause_button: [640, 400]
    timings:
      video_load_wait: 5            # Seconds to wait for video to load
      video_play_duration: 10       # Max seconds to wait per video
      between_videos: 3             # Seconds between video transitions
    max_videos: 10                  # Maximum videos to cycle through
    video_count_validation:
      enabled: true
      baseline_file: "reports/video_count_baseline.json"
      unexpected_drop_threshold: 0   # Fail if count drops to this level
      unexpected_spike_threshold: 50  # Fail if count exceeds this level
      video_text_keywords:           # Keywords to identify video elements in UI dump
        - "video"
        - "play"
        - "thumbnail"
    recovery:
      enabled: true
      max_retries: 2                 # Max recovery attempts before giving up
      popup_keywords:                # Keywords to detect error popups
        - "error"
        - "failed"
        - "retry"
        - "ok"
        - "cancel"
        - "close"
      check_interval: 2              # Seconds between popup checks during playback

  storymaker:
    package: "com.miko.story_maker"
    activity: ".MainActivity"
    display_name: "Storymaker"
    launch_method: "click"
    app_icon_coordinates: [933, 212]     # Storymaker talent icon
    pre_clicks: [[1207, 644]]             # Click Apps button first
    search_enabled: false
    search_config:
      apps_button_coordinates: [1207, 644]
      search_icon_coordinates: null
      search_text: "Storymaker"
      search_result_coordinates: null
      search_result_coordinates: [238, 365]        # [x, y] - coordinates of app result to click (auto-detect if null)
    intent_extras:
      APP_ID: "121"
      INTENT: "create_story"
    coordinates:
      ai_disclaimer_cross: [154, 120]
      create_story: [186, 591]
      click_on_exit_button: [71, 73]
      no_button: [892, 620]
      yes_button: [1114, 630]
      exit_button_to_root_screen: [55, 77]
      # New coordinates for tabs and viewer
      story_book_tab: [476, 77]
      my_adventure_tab: [663, 67]
      like_icon: [1114, 630]        # "Yes" button in Viewer
      dislike_icon: [892, 620]     # "No" button in Viewer
      new_first_story_card: [300, 400] # New User First story in list
      existing_first_story_card: [590, 370] # Existing User First story in list

    timings:
      load_wait: 10
      animation_wait: 3
      step_delay: 2
      conversation_wait: 15
      num_questions: 6
      # New timings for storybook review
      page_audio_wait: 12
      min_pages: 5
      max_pages: 7
    scenario: "new_user" # Options: "new_user", "existing_user"
    response_phrases:
      - "A brave knight named Sir Lancelot"
      - "In a deep, magical forest"
      - "A fire-breathing but friendly dragon"
      - "Searching for the lost golden crown"
      - "They all shared a big feast"
      - "And they lived happily ever after"
    conversation:
      intro_max_wait: 45
      listening_poll_interval: 3
      listening_max_wait: 30
      story_build_max_wait: 60
      initial_response: "Yes"
      topic_sentences:
        - "A story about a cricket match"
        - "A magical doll that can talk"
        - "A friendly robot who helps everyone"
        - "A toy car that can fly"
        - "A brave knight in a castle"
        - "A dragon who loves to paint"
      num_rounds: 6
      final_feedback: "Yes I like this story"

  vooks:
    package: "com.miko.vooks"
    activity: ".game.view.activity.GameActivity"
    display_name: "Vooks"
    launch_method: "click"            # Options: "click" (default)
    app_icon_coordinates: null        # For "click" method: [x, y] coordinates of app icon
    search_enabled: false             # For "search" method: enable search-based launching
    search_config:                    # For "search" method: configuration
      apps_button_coordinates: null   # [x, y] - coordinates of "Apps" button on home screen
      search_icon_coordinates: null   # [x, y] - coordinates of search icon inside apps drawer
      search_text: "Vooks"            # Text to search for in search bar
      search_result_coordinates: null # [x, y] - coordinates of app result to click (auto-detect if null)
    intent_extras:
      APP_ID: "104"
      INTENT: "play_story"
    coordinates:
      story_list_first: [300, 400]    # First thumbnail position
      play_button: [640, 400]         # Center play/pause toggle
      pause_button: [640, 400]        # Center
      cross_button: [1200, 60]        # Top-right cross icon (estimate)
      seek_bar_y: [700]               # Y-coordinate of scrubber bar
    timings:
      load_wait: 5
      video_load_wait: 15             # Handles video loading delay
      play_duration: 15               # Default play duration to test
      session_timeout: 120

  adventure_book:
    package: "com.miko.story_maker"
    activity: ".MainActivity"
    display_name: "My Adventure Book"
    launch_method: "click"                  # Options: "click" (default)
    app_icon_coordinates: [933, 212]        # For "click" method: [x, y] coordinates of app icon
    search_enabled: false                   # For "search" method: enable search-based launching
    search_config:                          # For "search" method: configuration
      apps_button_coordinates: [1207, 644]  # [x, y] - coordinates of "Apps" button on home screen
      search_icon_coordinates: null         # [x, y] - coordinates of search icon inside apps drawer
      search_text: "Adventure Book"         # Text to search for in search bar
      search_result_coordinates: null       # [x, y] - coordinates of app result to click (auto-detect if null)
    intent_extras:
      APP_ID: "130"
      INTENT: "read_book"
    coordinates:
      story_list_first: [640, 200]
      page_next: [1100, 400]
    timings:
      load_wait: 10
      page_duration: 10
      session_timeout: 120

# --- Third-Party Talent Defaults ---
thirdparty:
  default_launch_wait: 5            # Seconds to wait after launching
  smoke_test_duration: 10           # Seconds to keep talent open for smoke test
  interaction_delay: 2              # Seconds between interactions

# --- Verification Settings ---
verification:
  screenshot_dir: "reports/screenshots"
  screenshot_diff_threshold: 0.05   # 5% pixel difference threshold
  logcat_buffer_size: 4096          # Lines of logcat to capture
  crash_patterns:
    - "FATAL EXCEPTION"
    - "ANR in"
    - "has died"
    - "Force finishing activity"
  success_patterns:
    - "Activity resumed"
    - "Displayed"

# --- Reporting Settings ---
reporting:
  output_dir: "reports"
  report_filename: "miko3_test_report_{timestamp}.html"
  embed_screenshots: true
  max_log_lines: 200

# --- RICE POT Default Scores ---
# Scores: 1-10 scale (Effort is inverted: higher = less effort = better)
rice_pot:
  mikoji:
    reach: 9
    impact: 8
    confidence: 7
    effort: 5
  storymaker:
    reach: 7
    impact: 7
    confidence: 6
    effort: 4
  vooks:
    reach: 8
    impact: 8
    confidence: 7
    effort: 6
  thirdparty:
    reach: 5
    impact: 6
    confidence: 4
    effort: 3

# --- Logging ---
logging:
  level: "INFO"                      # DEBUG, INFO, WARNING, ERROR
  log_file: "reports/automation.log"
  console_output: true
